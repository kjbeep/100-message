<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Months</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #221420;
    --ink-deep: #180d17;
    --rose: #c98a93;
    --rose-dim: #8a5a60;
    --gold: #c9a15a;
    --gold-soft: #e2c98f;
    --cream: #f3e9e4;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    height: 100%;
    background: var(--ink);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    overflow-x: hidden;
  }

  body{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 6vh 5vw 8vh;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(201,138,147,0.18), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(201,161,90,0.10), transparent 55%),
      var(--ink);
  }

  /* faint constellation of 8 points, one per month */
  .month-trail{
    position: absolute;
    top: 4vh;
    left: 50%;
    transform: translateX(-50%);
    width: min(560px, 80vw);
    height: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0.85;
  }
  .month-trail .dot{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rose-dim);
    position: relative;
  }
  .month-trail .dot.lit{
    background: var(--gold-soft);
    box-shadow: 0 0 8px 1px rgba(226,201,143,0.6);
  }
  .month-trail::before{
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,138,147,0.35) 10%, rgba(201,138,147,0.35) 90%, transparent);
    z-index: -1;
  }

  header{
    text-align: center;
    margin-top: 6vh;
    margin-bottom: 5vh;
  }

  .eyebrow{
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 0.9rem;
  }

  h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    margin: 0;
    line-height: 1.05;
    color: var(--cream);
  }

  h1 em{
    font-style: italic;
    color: var(--gold-soft);
    font-weight: 400;
  }

  .sub{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 2vw, 1.25rem);
    color: rgba(243,233,228,0.7);
    margin-top: 1rem;
    max-width: 34ch;
    margin-left: auto;
    margin-right: auto;
  }

  /* ---------- CARD GRID ---------- */
  .stage{
    position: relative;
    width: 100%;
    max-width: 720px;
    max-height: 56vh;
    margin-top: 2vh;
    overflow-y: auto;
    padding: 8px 4px 24px;
    -webkit-overflow-scrolling: touch;
  }

  .stage::-webkit-scrollbar{ width: 5px; }
  .stage::-webkit-scrollbar-thumb{ background: rgba(226,201,143,0.3); border-radius: 3px; }

  .fan{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
    gap: 8px;
    justify-items: center;
  }

  .card{
    --lift: 0px;
    position: relative;
    width: 100%;
    max-width: 58px;
    aspect-ratio: 32 / 29;
    cursor: pointer;
    transform: translateY(var(--lift)) scale(1);
    transition: transform 0.3s cubic-bezier(.22,.68,0,1.12), opacity 0.5s ease, filter 0.5s ease;
  }

  .card:hover{
    --lift: -6px;
  }

  .card .face{
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
  }

  .card .back{
    background:
      radial-gradient(circle at 50% 38%, rgba(226,201,143,0.22), transparent 55%),
      linear-gradient(160deg, #3a2030, #1c1119 75%);
    -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 29"><path d="M16 29 C16 29 0 18 0 8 C0 3 4 0 8 0 C12 0 16 4 16 4 C16 4 20 0 24 0 C28 0 32 3 32 8 C32 18 16 29 16 29 Z"/></svg>');
    mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 29"><path d="M16 29 C16 29 0 18 0 8 C0 3 4 0 8 0 C12 0 16 4 16 4 C16 4 20 0 24 0 C28 0 32 3 32 8 C32 18 16 29 16 29 Z"/></svg>');
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card .back .mark{
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.6rem;
    color: var(--gold-soft);
    opacity: 0.85;
    margin-top: 4px;
  }

  .card.disabled{
    opacity: 0.28;
    filter: saturate(0.4);
    pointer-events: none;
  }

  .card.chosen{
    z-index: 5;
  }

  /* ---------- REVEAL ---------- */
  .reveal{
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,6,10,0);
    pointer-events: none;
    opacity: 0;
    transition: background 0.6s ease, opacity 0.6s ease;
    z-index: 20;
    padding: 6vw;
  }

  .reveal.active{
    background: rgba(10,6,10,0.86);
    opacity: 1;
    pointer-events: auto;
  }

  .reveal-card{
    width: min(360px, 86vw);
    padding: 2.6rem 2.1rem 2.2rem;
    border-radius: 14px;
    background: linear-gradient(165deg, #34202f, #201017 75%);
    border: 1px solid rgba(226,201,143,0.4);
    box-shadow: 0 30px 60px rgba(0,0,0,0.55);
    text-align: center;
    transform: scale(0.85) translateY(20px);
    transition: transform 0.6s cubic-bezier(.22,.68,0,1.12);
  }

  .reveal.active .reveal-card{
    transform: scale(1) translateY(0);
  }

  .reveal-eyebrow{
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-bottom: 1.1rem;
  }

  .reveal-message{
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 3.4vw, 1.6rem);
    line-height: 1.5;
    color: var(--cream);
  }

  .reveal-foot{
    margin-top: 1.6rem;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    color: rgba(243,233,228,0.55);
  }

  .close-btn{
    margin-top: 1.8rem;
    background: none;
    border: 1px solid rgba(226,201,143,0.5);
    color: var(--gold-soft);
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .close-btn:hover{
    background: var(--gold-soft);
    color: var(--ink-deep);
  }

  .hint{
    margin-top: 3vh;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    color: rgba(243,233,228,0.4);
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .reveal, .reveal-card{ transition: none !important; }
  }
</style>
</head>
<body>

  <div class="month-trail" id="monthTrail"></div>

  <header>
    <div class="eyebrow">Eight months, today</div>
    <h1>Pick <em>one</em> card</h1>
    <p class="sub">100 cards. Only one. Whatever you draw is yours for today.</p>
  </header>

  <div class="stage">
    <div class="fan" id="fan"></div>
  </div>

  <p class="hint" id="hint">tap a card — you only get one</p>

  <div class="reveal" id="reveal">
    <div class="reveal-card">
      <div class="reveal-eyebrow">Today's reward</div>
      <div class="reveal-message" id="revealMessage"></div>
      <div class="reveal-foot">8 months down. still my favourite one.</div>
      <button class="close-btn" id="closeBtn">keep this close</button>
    </div>
  </div>

<script>

    "If something exciting happens... you're one of the first people I want to tell. That's how important you've become to me.",
    "Life has challenged you. Our relationship has challenged us. But you've kept trying. Thank you.",
    "If you're still reading... I hope you're smiling. Because I definitely was while writing these.",
    "There are so many people in this world. Yet somehow... my heart found you.",
    "Eight months later... and I'd still choose this story. I'd still choose you.",
    "My quiet wish is simple. That life becomes kinder to you. Because you deserve kindness.",
    "If you've made it this far... thank you for reading every little piece of my heart. I meant every single word.",
    "Thank you. For every conversation. For every laugh. For every lesson.",
    "Thank you for loving me in your own beautiful way. No matter where life takes us from here, these eight months will always be one of the chapters I'll hold close to my heart."

  // build the month trail (8 dots, all lit — 8 months made it here)
  const trail = document.getElementById('monthTrail');
  for(let i=0;i<8;i++){
    const d = document.createElement('div');
    d.className = 'dot lit';
    trail.appendChild(d);
  }

  const fan = document.getElementById('fan');
  const totalCards = 100;
  const cards = [];

  for(let i=0;i<totalCards;i++){
    const card = document.createElement('div');
    card.className = 'card';

    const back = document.createElement('div');
    back.className = 'face back';
    const mark = document.createElement('div');
    mark.className = 'mark';
    mark.textContent = i+1;
    back.appendChild(mark);
    card.appendChild(back);

    card.addEventListener('click', () => chooseCard(i, card));
    fan.appendChild(card);
    cards.push(card);
  }

  let chosen = false;

  function chooseCard(index, cardEl){
    if(chosen) return;
    chosen = true;

    cards.forEach(c => {
      if(c !== cardEl) c.classList.add('disabled');
    });
    cardEl.classList.add('chosen');
    cardEl.style.setProperty('--lift', '-26px');

    document.getElementById('hint').textContent = "this one's yours today";

    const message = messages[index % messages.length] || "(write something here for card " + (index+1) + ")";
    document.getElementById('revealMessage').textContent = message;

    setTimeout(() => {
      document.getElementById('reveal').classList.add('active');
    }, 380);
  }

  document.getElementById('closeBtn').addEventListener('click', () => {
    document.getElementById('reveal').classList.remove('active');
  });
</script>

</body>
</html>
